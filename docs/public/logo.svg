<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Left ear -->
  <ellipse cx="16" cy="8" rx="5" ry="10" fill="#D1884F" transform="rotate(-10 16 8)"/>
  <ellipse cx="16" cy="8" rx="3" ry="7" fill="#FEDC90" transform="rotate(-10 16 8)"/>
  <!-- Right ear -->
  <ellipse cx="32" cy="8" rx="5" ry="10" fill="#D1884F" transform="rotate(10 32 8)"/>
  <ellipse cx="32" cy="8" rx="3" ry="7" fill="#FEDC90" transform="rotate(10 32 8)"/>
  <!-- Head / body (pancake shape) -->
  <ellipse cx="24" cy="28" rx="18" ry="16" fill="#D1884F"/>
  <ellipse cx="24" cy="26" rx="18" ry="16" fill="#FEDC90"/>
  <!-- Face shadow -->
  <ellipse cx="24" cy="27" rx="15" ry="13" fill="#FFF0C0" opacity="0.5"/>
  <!-- Left eye -->
  <ellipse cx="18" cy="23" rx="2.8" ry="3.2" fill="#633001"/>
  <ellipse cx="17.2" cy="22" rx="1.1" ry="1.3" fill="#FFFFFF"/>
  <!-- Right eye -->
  <ellipse cx="30" cy="23" rx="2.8" ry="3.2" fill="#633001"/>
  <ellipse cx="29.2" cy="22" rx="1.1" ry="1.3" fill="#FFFFFF"/>
  <!-- Mouth -->
  <path d="M21 30 Q24 34 27 30" fill="none" stroke="#633001" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="13" cy="28" rx="3" ry="2" fill="#ED4B9E" opacity="0.25"/>
  <ellipse cx="35" cy="28" rx="3" ry="2" fill="#ED4B9E" opacity="0.25"/>
</svg>
